<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" style="width:100%;height:100%;background:#e8f4e8;">
  <!-- Background areas -->
  <rect x="0" y="0" width="900" height="650" fill="#c8e6c9" rx="0"/>
  
  <!-- Roads -->
  <rect x="0" y="290" width="900" height="22" fill="#bdbdbd" opacity="0.7"/>
  <rect x="430" y="0" width="22" height="650" fill="#bdbdbd" opacity="0.7"/>
  <rect x="0" y="490" width="900" height="18" fill="#bdbdbd" opacity="0.6"/>
  <rect x="650" y="0" width="18" height="650" fill="#bdbdbd" opacity="0.6"/>
  <rect x="200" y="0" width="18" height="650" fill="#bdbdbd" opacity="0.55"/>
  
  <!-- ===== ZONE A: 北側建築群 (TOP) ===== -->
  <!-- 焯炤館 (Main Auditorium) -->
  <rect x="240" y="30" width="160" height="100" fill="#1565c0" rx="6"/>
  <text x="320" y="70" text-anchor="middle" fill="white" font-size="13" font-weight="bold">焯炤館</text>
  <text x="320" y="88" text-anchor="middle" fill="#90caf9" font-size="10">演講廳/多功能廳</text>
  <text x="320" y="105" text-anchor="middle" fill="#bbdefb" font-size="9">容量 300人</text>
  
  <!-- 進修部演講廳 -->
  <rect x="460" y="30" width="140" height="100" fill="#1976d2" rx="6"/>
  <text x="530" y="68" text-anchor="middle" fill="white" font-size="12" font-weight="bold">進修部</text>
  <text x="530" y="85" text-anchor="middle" fill="#90caf9" font-size="10">演講廳</text>
  <text x="530" y="102" text-anchor="middle" fill="#bbdefb" font-size="9">容量 200人</text>
  
  <!-- 圖書館 -->
  <rect x="40" y="50" width="130" height="110" fill="#0277bd" rx="6"/>
  <text x="105" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">圖書館</text>
  <text x="105" y="113" text-anchor="middle" fill="#b3e5fc" font-size="9">研討室/閱覽室</text>
  
  <!-- 聖言樓 -->
  <rect x="680" y="30" width="110" height="90" fill="#283593" rx="6"/>
  <text x="735" y="68" text-anchor="middle" fill="white" font-size="11" font-weight="bold">聖言樓</text>
  <text x="735" y="85" text-anchor="middle" fill="#9fa8da" font-size="9">ST</text>
  
  <!-- ===== ZONE B: 中央核心區 ===== -->
  <!-- 仁愛空間 / 課指組 -->
  <rect x="240" y="165" width="120" height="90" fill="#00695c" rx="6"/>
  <text x="300" y="200" text-anchor="middle" fill="white" font-size="11" font-weight="bold">仁愛空間</text>
  <text x="300" y="218" text-anchor="middle" fill="#b2dfdb" font-size="9">課外活動指導組</text>
  
  <!-- 行政大樓 -->
  <rect x="470" y="155" width="140" height="100" fill="#37474f" rx="6"/>
  <text x="540" y="193" text-anchor="middle" fill="white" font-size="12" font-weight="bold">行政大樓</text>
  <text x="540" y="212" text-anchor="middle" fill="#cfd8dc" font-size="9">總務處/教務處</text>
  
  <!-- 潛水艇的天空 (Creative Space) -->
  <rect x="50" y="165" width="120" height="85" fill="#6a1b9a" rx="6"/>
  <text x="110" y="199" text-anchor="middle" fill="white" font-size="10" font-weight="bold">潛水艇的天空</text>
  <text x="110" y="215" text-anchor="middle" fill="#e1bee7" font-size="9">創意工作坊</text>
  
  <!-- 理工學院 -->
  <rect x="680" y="155" width="140" height="100" fill="#bf360c" rx="6"/>
  <text x="750" y="193" text-anchor="middle" fill="white" font-size="11" font-weight="bold">理工學院</text>
  <text x="750" y="210" text-anchor="middle" fill="#ffccbc" font-size="9">CS/資工/統計</text>
  
  <!-- ===== ZONE C: 下方建築 ===== -->
  <!-- 體育館 -->
  <rect x="40" y="330" width="150" height="110" fill="#2e7d32" rx="6"/>
  <text x="115" y="376" text-anchor="middle" fill="white" font-size="13" font-weight="bold">體育館</text>
  <text x="115" y="395" text-anchor="middle" fill="#c8e6c9" font-size="9">籃球/羽球場</text>
  
  <!-- 學生活動中心 -->
  <rect x="240" y="330" width="150" height="110" fill="#e65100" rx="6"/>
  <text x="315" y="374" text-anchor="middle" fill="white" font-size="11" font-weight="bold">學生活動中心</text>
  <text x="315" y="392" text-anchor="middle" fill="#ffe0b2" font-size="9">社辦/多功能室</text>
  
  <!-- 醫學院 -->
  <rect x="460" y="330" width="150" height="110" fill="#c62828" rx="6"/>
  <text x="535" y="374" text-anchor="middle" fill="white" font-size="13" font-weight="bold">醫學院</text>
  <text x="535" y="392" text-anchor="middle" fill="#ffcdd2" font-size="9">MD/護理</text>
  
  <!-- 宗倫樓 -->
  <rect x="680" y="330" width="150" height="110" fill="#4527a0" rx="6"/>
  <text x="755" y="374" text-anchor="middle" fill="white" font-size="12" font-weight="bold">宗倫樓</text>
  <text x="755" y="392" text-anchor="middle" fill="#ede7f6" font-size="9">大禮堂/教室</text>
  
  <!-- ===== ZONE D: 底部 ===== -->
  <!-- 停車場 -->
  <rect x="40" y="510" width="120" height="90" fill="#546e7a" rx="6"/>
  <text x="100" y="548" text-anchor="middle" fill="white" font-size="12" font-weight="bold">停車場</text>
  <text x="100" y="565" text-anchor="middle" fill="#cfd8dc" font-size="9">P1/P2</text>
  
  <!-- 男女生宿舍 -->
  <rect x="200" y="510" width="120" height="90" fill="#f9a825" rx="6"/>
  <text x="260" y="548" text-anchor="middle" fill="#212121" font-size="11" font-weight="bold">男生宿舍</text>
  
  <rect x="360" y="510" width="120" height="90" fill="#f06292" rx="6"/>
  <text x="420" y="548" text-anchor="middle" fill="white" font-size="11" font-weight="bold">女生宿舍</text>
  
  <!-- 輔大廣場/中庭 -->
  <rect x="510" y="510" width="150" height="90" fill="#558b2f" rx="6"/>
  <text x="585" y="548" text-anchor="middle" fill="white" font-size="11" font-weight="bold">輔大廣場</text>
  <text x="585" y="565" text-anchor="middle" fill="#dcedc8" font-size="9">中庭/活動廣場</text>
  
  <!-- 校門口 -->
  <rect x="700" y="510" width="130" height="90" fill="#d84315" rx="6"/>
  <text x="765" y="548" text-anchor="middle" fill="white" font-size="12" font-weight="bold">校門口</text>
  <text x="765" y="565" text-anchor="middle" fill="#ffccbc" font-size="9">正門/東門</text>

  <!-- ===== ACCESSIBILITY ICONS ===== -->
  <!-- Wheelchair Ramps (blue circles) -->
  <circle cx="240" cy="130" r="10" fill="#2196f3" opacity="0.9"/>
  <text x="240" y="134" text-anchor="middle" fill="white" font-size="11">♿</text>
  
  <circle cx="460" cy="130" r="10" fill="#2196f3" opacity="0.9"/>
  <text x="460" y="134" text-anchor="middle" fill="white" font-size="11">♿</text>
  
  <circle cx="240" cy="254" r="10" fill="#2196f3" opacity="0.9"/>
  <text x="240" y="258" text-anchor="middle" fill="white" font-size="11">♿</text>
  
  <circle cx="460" cy="254" r="10" fill="#2196f3" opacity="0.9"/>
  <text x="460" y="258" text-anchor="middle" fill="white" font-size="11">♿</text>

  <circle cx="390" cy="440" r="10" fill="#2196f3" opacity="0.9"/>
  <text x="390" y="444" text-anchor="middle" fill="white" font-size="11">♿</text>
  
  <!-- Elevators (green squares) -->
  <rect x="165" y="85" width="20" height="20" fill="#4caf50" rx="3" opacity="0.9"/>
  <text x="175" y="99" text-anchor="middle" fill="white" font-size="11">🛗</text>
  
  <rect x="620" y="185" width="20" height="20" fill="#4caf50" rx="3" opacity="0.9"/>
  <text x="630" y="199" text-anchor="middle" fill="white" font-size="11">🛗</text>
  
  <rect x="380" y="360" width="20" height="20" fill="#4caf50" rx="3" opacity="0.9"/>
  <text x="390" y="374" text-anchor="middle" fill="white" font-size="11">🛗</text>
  
  <!-- Accessible Restrooms (purple) -->
  <circle cx="370" cy="200" r="9" fill="#9c27b0" opacity="0.85"/>
  <text x="370" y="204" text-anchor="middle" fill="white" font-size="10">🚻</text>
  
  <circle cx="650" cy="370" r="9" fill="#9c27b0" opacity="0.85"/>
  <text x="650" y="374" text-anchor="middle" fill="white" font-size="10">🚻</text>
  
  <circle cx="170" cy="370" r="9" fill="#9c27b0" opacity="0.85"/>
  <text x="170" y="374" text-anchor="middle" fill="white" font-size="10">🚻</text>
  
  <!-- Parking for Disabled (orange diamonds) -->
  <polygon points="830,520 845,505 860,520 845,535" fill="#ff9800" opacity="0.9"/>
  <text x="845" y="524" text-anchor="middle" fill="white" font-size="9">P♿</text>
  
  <polygon points="90,508 105,493 120,508 105,523" fill="#ff9800" opacity="0.9"/>
  <text x="105" y="512" text-anchor="middle" fill="white" font-size="9">P♿</text>

  <!-- Entrance Markers -->
  <polygon points="430,640 452,615 408,615" fill="#f44336"/>
  <text x="431" y="635" text-anchor="middle" fill="white" font-size="10">入口</text>
  
  <!-- Compass -->
  <circle cx="858" cy="58" r="28" fill="white" opacity="0.85"/>
  <text x="858" y="45" text-anchor="middle" fill="#f44336" font-size="12" font-weight="bold">N</text>
  <text x="858" y="72" text-anchor="middle" fill="#1565c0" font-size="11">S</text>
  <line x1="858" y1="34" x2="858" y2="80" stroke="#333" stroke-width="1.5"/>
  <line x1="835" y1="57" x2="881" y2="57" stroke="#333" stroke-width="1.5"/>

  <!-- Legend Box -->
  <rect x="8" y="590" width="425" height="52" fill="white" opacity="0.9" rx="6"/>
  <circle cx="24" cy="606" r="7" fill="#2196f3"/>
  <text x="36" y="610" fill="#1565c0" font-size="9" font-weight="bold">♿ 無障礙坡道</text>
  <rect x="90" y="599" width="14" height="14" fill="#4caf50" rx="2"/>
  <text x="108" y="610" fill="#2e7d32" font-size="9" font-weight="bold">🛗 電梯</text>
  <circle cx="150" cy="606" r="7" fill="#9c27b0"/>
  <text x="162" y="610" fill="#6a1b9a" font-size="9" font-weight="bold">🚻 無障礙廁所</text>
  <polygon points="222,612 229,601 236,612 229,623" fill="#ff9800"/>
  <text x="242" y="610" fill="#e65100" font-size="9" font-weight="bold">P♿ 無障礙停車</text>
  <circle cx="24" cy="630" r="7" fill="#1565c0"/>
  <text x="36" y="634" fill="#1565c0" font-size="9">🔵 學術/行政</text>
  <circle cx="100" cy="630" r="7" fill="#2e7d32"/>
  <text x="112" y="634" fill="#2e7d32" font-size="9">🟢 活動/社團</text>
  <circle cx="175" cy="630" r="7" fill="#c62828"/>
  <text x="187" y="634" fill="#c62828" font-size="9">🔴 醫學/宗教</text>
  <circle cx="250" cy="630" r="7" fill="#e65100"/>
  <text x="262" y="634" fill="#e65100" font-size="9">🟠 學生服務</text>
</svg>
